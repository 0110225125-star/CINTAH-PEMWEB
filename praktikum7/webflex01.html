<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Flex 01</title>
  <style>
    #container {
      display: flex;
      flex-direction: row-reverse;
      flex-wrap: wrap;
      justify-content: space-between; /* sedang diketik di foto */
    }

    .box {
      font-size: 90pt;
      text-align: center;
      border: 1px solid;
      width: 100px;
      height: 100px;
    }
  </style>
</head>
<body>
  <div id="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
  </div>
</body>
</html>
